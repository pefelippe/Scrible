name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Server integration tests ──────────────────────────────────────────────
  test-server:
    name: Server tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: scribe_test
          POSTGRES_USER: scribe
          POSTGRES_PASSWORD: scribe
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: server

      - name: Run integration tests
        run: npm test
        working-directory: server
        env:
          # Matches the default in tests/test-database-url.ts
          TEST_DATABASE_URL: postgresql://scribe:scribe@localhost:5432/scribe_test
          # Required by config validation; mocked in tests so value doesn't matter
          OPENAI_API_KEY: test-key

  # ── Web lint + type-check + build ─────────────────────────────────────────
  check-web:
    name: Web build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Lint
        run: npx eslint src
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web
