server {
    listen 80;

    # Allow audio uploads up to the Whisper API limit
    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://server:4000;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }
}
